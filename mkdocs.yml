site_name: CQC League Governance Wiki
site_description: Research wiki on CQC governance requirements and their application to professional Rugby League club medical services.
site_url: https://ajdench.github.io/cqc-league/
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/cqa-logo.svg
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search
  - llms-source:
      full_output: true
      markdown_urls: true
      description: >
        Research notes on CQC governance requirements, private healthcare
        registration patterns, and application to professional Rugby League
        club medical provision in England.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Board and Decisions:
      - Board Briefing: research/board-briefing.md
      - Board CQC Response and Outcomes: research/board-cqc-response.md
      - Registration Decision Model: research/registration-decision-model.md
      - CQC Scope Decision Research: research/cqc-scope-decision-research.md
      - Worked Examples: research/worked-examples.md
  - CQC Framework:
      - CQC Governance Baseline: research/cqc-governance-baseline.md
      - CQC Assurance Domains and Quality Statements: research/cqc-assurance-domains-quality-statements.md
      - CQC Registration Edge Cases: research/cqc-registration-edge-cases.md
      - Private Healthcare Synergies: research/private-healthcare-synergies.md
  - Rugby League Application:
      - Professional Rugby League Application: research/rugby-league-application.md
      - RFL Medical Standards Map: research/rfl-medical-standards-map.md
      - RFL Clause Evidence Map: research/rfl-clause-evidence-map.md
      - Medicines, Prescribing, and Anti-Doping: research/medicines-prescribing-anti-doping.md
  - Operating Model and Evidence:
      - Governance Operating Model: research/governance-operating-model.md
      - Minimum Compliance Pack Research: research/minimum-compliance-pack-research.md
      - Minimum Compliance Pack Scenario Matrix: research/minimum-compliance-pack-scenario-matrix.md
      - Assurance Pack Templates: research/assurance-pack-templates.md
  - Platform Product Research:
      - Product Research Roadmap: research/product-research-roadmap.md
      - Platform Opportunity: research/platform-opportunity-tool-landscape.md
      - Tool Landscape: research/platform-tool-landscape.md
      - Product Blueprint: research/platform-product-blueprint.md
      - MVP and Guardrails: research/platform-mvp-and-guardrails.md
  - Sources:
      - Source Map: research/source-map.md
