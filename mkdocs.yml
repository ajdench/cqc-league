site_name: CQC League Governance Wiki
site_description: Research wiki on CQC governance requirements and their application to professional Rugby League club medical services.
site_url: https://ajdench.github.io/cqc-league/
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search
  - llms-source:
      full_output: true
      markdown_urls: true
      description: >
        Research notes on CQC governance requirements, private healthcare
        registration patterns, and application to professional Rugby League
        club medical provision in England.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Research:
      - CQC Governance Baseline: research/cqc-governance-baseline.md
      - CQC Assurance Domains and Quality Statements: research/cqc-assurance-domains-quality-statements.md
      - CQC Registration Edge Cases: research/cqc-registration-edge-cases.md
      - Professional Rugby League Application: research/rugby-league-application.md
      - RFL Medical Standards Map: research/rfl-medical-standards-map.md
      - Private Healthcare Synergies: research/private-healthcare-synergies.md
      - Medicines, Prescribing, and Anti-Doping: research/medicines-prescribing-anti-doping.md
      - Registration Decision Model: research/registration-decision-model.md
      - Governance Operating Model: research/governance-operating-model.md
      - Assurance Pack Templates: research/assurance-pack-templates.md
      - Source Map: research/source-map.md
